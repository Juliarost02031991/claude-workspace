<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #3d3730;
    font-family: 'Georgia', serif;
    overflow: hidden;
    position: relative;
  }

  .bg-photo {
    position: absolute;
    inset: 0;
    background: url('images/Objekt.png') no-repeat 65% center / auto 110%;
    opacity: 0.65;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      rgba(61,55,48,0.92) 0%,
      rgba(61,55,48,0.6) 50%,
      rgba(61,55,48,0.1) 100%
    );
  }

  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 7px;
    background: linear-gradient(to right, #b8933f, #D6AE64, #c19a49);
  }

  .content {
    position: absolute;
    top: 0; left: 0;
    width: 600px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 70px 70px 70px 80px;
  }

  .top-tag {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 28px;
    color: #D6AE64;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .title-main {
    font-family: Georgia, serif;
    font-size: 130px;
    font-weight: bold;
    color: #FBF1EE;
    line-height: 0.85;
    letter-spacing: -3px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .title-sub {
    font-family: Georgia, serif;
    font-size: 88px;
    font-style: italic;
    color: #D6AE64;
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 30px;
  }

  .tagline {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 26px;
    color: rgba(251,241,238,0.85);
    line-height: 1.5;
    margin-bottom: 36px;
    border-left: 3px solid #D6AE64;
    padding-left: 18px;
  }

  .date-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 36px;
  }

  .date-item {
    font-family: Arial, sans-serif;
    font-size: 22px;
    color: rgba(251,241,238,0.8);
    letter-spacing: 0.5px;
  }

  .date-item span {
    color: #D6AE64;
    font-weight: bold;
    margin-right: 8px;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, #b8933f, #D6AE64);
    border-radius: 50px;
    padding: 14px 32px;
    font-family: Arial, sans-serif;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.5px;
    width: fit-content;
    margin-bottom: 20px;
  }

  .cta {
    display: inline-block;
    background: #FBF1EE;
    color: #2a2a2a;
    font-family: Arial, sans-serif;
    font-size: 22px;
    font-weight: bold;
    padding: 16px 36px;
    border-radius: 50px;
    width: fit-content;
  }

  .author {
    position: absolute;
    bottom: 30px;
    left: 80px;
    font-family: Arial, sans-serif;
    font-size: 18px;
    color: rgba(251,241,238,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="top-bar"></div>

  <div class="content">
    <div class="top-tag">Kostenloser Live-Workshop</div>
    <div class="title-main">GUT</div>
    <div class="title-sub">Genug.</div>
    <div class="tagline">Du bist nicht zu viel.<br>Du bist nicht zu wenig.<br>Du bist <em style="color:#D6AE64">genau richtig.</em></div>
    <div class="date-col">
      <div class="date-item"><span>📅</span>14. Mai 2026 · 10:00 – 12:30 Uhr</div>
      <div class="date-item"><span>🖥</span>Online · 100% kostenlos</div>
    </div>
    <div class="badge">✦ Jetzt anmelden</div>
  </div>

  <div class="author">juliarost.de</div>
</body>
</html>
